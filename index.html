<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Registration Logger</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; text-transform: uppercase; text-align: center; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:active { background: #218838; }
        #status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h2>Log Car Reg</h2>
    <input type="text" id="carReg" placeholder="ENTER REG" autocomplete="off">
    <button onclick="sendData()">Submit to Sheet</button>
    <p id="status"></p>
</div>

<script>
    async function sendData() {
        const regInput = document.getElementById('carReg');
        const status = document.getElementById('status');
        
        // PASTE YOUR URL BETWEEN THE QUOTES BELOW
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6uZlCfhgSGGCGfZeQAwhZdTLZmnfi19ljMknQKfpvJR3jOxSnNAJcWw-ZeUqaU1GY/exec';

        if (!regInput.value) {
            status.innerText = "Please enter a registration!";
            return;
        }

        status.innerText = "Sending to Google Sheets...";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // This prevents the 'Error' message on the website
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reg: regInput.value.toUpperCase() })
            });

            status.innerText = "✅ Logged successfully!";
            regInput.value = ""; // Clear the box
        } catch (error) {
            status.innerText = "❌ Connection Error";
            console.error(error);
        }
    }
</script>

</body>
</html>
