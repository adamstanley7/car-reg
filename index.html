<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="logo.png">
    <title>Bonnington Leisure Centre | Car Registry</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="navbar">
        <img src="logo.png" alt="Bonnington Hotel Logo" class="brand-logo">
        <p class="navbar-subtitle">LEISURE CENTRE REGISTRY</p>
    </div>

    <div class="main-content">
        <div class="registration-card">
            <label for="carReg">MEMBER VEHICLE REGISTRATION</label>
            <input type="text" id="carReg" placeholder="EG 12D3456" maxlength="12" autocomplete="off" autocapitalize="characters" spellcheck="false">
            <button id="submitBtn" class="primary-btn" onclick="sendData()">SUBMIT ENTRY</button>
            <p id="status"></p>
        </div>

        <button class="toggle-btn" id="toggleLogsBtn" onclick="toggleLogsView()">SHOW RECENT ENTRIES</button>

        <div class="history-panel" id="logsPanel">
            <div class="history-header">
                <span>RECENT ACTIVITY LOGS</span>
                <span class="refresh-action" onclick="fetchLogs()">REFRESH PANEL</span>
            </div>
            <table>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
